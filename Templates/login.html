<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RFID Presence — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #070a0f;
    --surface: #0d1117;
    --surface2: #161b22;
    --border: #21262d;
    --green: #39d353;
    --red: #f85149;
    --text: #e6edf3;
    --muted: #7d8590;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(57,211,83,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(57,211,83,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .glow {
    position: fixed;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(57,211,83,0.08) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .login-box {
    position: relative;
    z-index: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    animation: fadeUp 0.4s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }

  .brand-icon {
    width: 40px; height: 40px;
    border: 2px solid var(--green);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    animation: pulse-border 2s infinite;
  }

  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 0 0 rgba(57,211,83,0.4); }
    50% { box-shadow: 0 0 0 6px rgba(57,211,83,0); }
  }

  .brand-name { font-size: 22px; font-weight: 800; }
  .brand-name span { color: var(--green); }

  .login-title {
    font-size: 26px; font-weight: 800;
    margin-bottom: 8px; letter-spacing: -0.5px;
  }

  .login-subtitle {
    font-size: 14px; color: var(--muted);
    margin-bottom: 32px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-group label {
    display: block;
    font-size: 12px; font-weight: 700;
    color: var(--muted); margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: 1px;
  }

  .form-group input {
    width: 100%; padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 14px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .form-group input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(57,211,83,0.1);
  }

  .form-group input::placeholder { color: var(--muted); }

  .login-btn {
    width: 100%; padding: 14px;
    background: var(--green); color: #000;
    border: none; border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 800;
    cursor: pointer; margin-top: 8px;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .login-btn:hover { background: #2ab844; transform: translateY(-1px); }
  .login-btn:active { transform: translateY(0); }
  .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .error-msg {
    background: rgba(248,81,73,0.1);
    border: 1px solid rgba(248,81,73,0.3);
    color: var(--red); border-radius: 8px;
    padding: 10px 14px; font-size: 13px;
    margin-bottom: 20px; display: none;
    font-family: 'Space Mono', monospace;
  }

  .error-msg.show { display: block; animation: shake 0.3s ease; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .footer-text {
    text-align: center; margin-top: 24px;
    font-size: 12px; color: var(--muted);
    font-family: 'Space Mono', monospace;
  }
</style>
</head>
<body>
<div class="glow"></div>

<div class="login-box">
  <div class="brand">
    <div class="brand-icon">⬡</div>
    <div class="brand-name">RFID <span>PRESENCE</span></div>
  </div>

  <div class="login-title">Welcome back</div>
  <div class="login-subtitle">Sign in to access the dashboard</div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username" autocomplete="username">
  </div>

  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
  </div>

  <button class="login-btn" id="loginBtn" onclick="doLogin()">Sign In</button>

  <div class="footer-text">RFID Presence System v2.0</div>
</div>

<script>
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');

    if (!username || !password) {
      showError('Please enter username and password');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in...';

    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (data.success) {
        btn.textContent = '✓ Success!';
        setTimeout(() => window.location.href = '/', 500);
      } else {
        showError(data.error || 'Invalid credentials');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    } catch(e) {
      showError('Connection error. Try again.');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  function showError(msg) {
    const err = document.getElementById('errorMsg');
    err.textContent = msg;
    err.classList.remove('show');
    void err.offsetWidth;
    err.classList.add('show');
  }
</script>
</body>
</html>
